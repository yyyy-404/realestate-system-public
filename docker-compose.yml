services:

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: realestate
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://root:123456@db:3306/realestate
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: