<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页界面</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="page">
    <div class="shell">

      <!-- 左侧栏 -->
      <aside class="sidebar">
        <div class="logo">🏠 房产系统</div>
        <!-- 用户信息区 -->
          <div class="user-block">
            <div class="avatar">👤</div>
            <div class="username">你好，<span id="username"></span></div>

            <!-- 提前放退出按钮 -->
            <button class="logout-btn" onclick="RS.logout()">退出登录</button>
          </div>
          
      </aside>

      <!-- 主区域 -->
      <main class="main">
        <section class="hero panel">
          <div>
            <h2>首页</h2>
          </div>
        </section>

        <!-- 功能入口 -->
        <section class="grid" style="margin-top:16px">

          <a href="./properties.html" class="card link-card">
            <h3>房源列表</h3>
            <p>浏览所有房源信息</p>
            <span class="card-action">进入 →</span>
          </a>

          <a href="./publish.html" class="card link-card">
            <h3>发布房源</h3>
            <p>发布新的房产信息</p>
            <span class="card-action">进入 →</span>
          </a>

          <a href="./favorites.html" class="card link-card">
            <h3>收藏</h3>
            <p>查看收藏的房源</p>
            <span class="card-action">进入 →</span>
          </a>

          <a href="./contracts.html" class="card link-card">
            <h3>合同</h3>
            <p>查看与管理合同</p>
            <span class="card-action">进入 →</span>
          </a>

        </section>

      </main>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      RS.setupHome();

      const logoutBtn = document.querySelector(".logout-btn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          RS.clearAuth();
          location.href = "./login.html";
        });
      }
    });
  </script>

</body>
</html>
