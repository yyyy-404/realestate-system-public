<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房源列表界面</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <div class="shell">
      <aside class="panel nav" data-userbox>
        <h1>导航</h1>
        <div class="menu">
          <a href="./home.html">首页</a>
          <a href="./publish.html">房源发布</a>
          <a href="./favorites.html">收藏列表</a>
          <a href="./contracts.html">合同列表</a>
          <button type="button" onclick="RS.clearAuth(); location.href='./login.html'">退出登录</button>
        </div>
      </aside>
      <main class="panel main">
        <section class="hero panel">
          <div>
            <h2>房源列表界面</h2>
            <p>支持关键字筛选、状态筛选、价格筛选，并可直接收藏或发起合同。</p>
          </div>
          <div class="actions">
            <a class="btn" href="./publish.html">发布房源</a>
            <a class="btn btn-secondary" href="./favorites.html">查看收藏</a>
          </div>
        </section>

        <div class="toolbar">
          <input id="keyword" class="input" placeholder="搜索标题/地址/描述/房主" />
          <select id="status" class="select">
            <option value="">全部状态</option>
            <option value="在售">在售</option>
            <option value="待售">待售</option>
          </select>
          <select id="price" class="select">
            <option value="">最高价格不限</option>
            <option value="100">100 万以内</option>
            <option value="150">150 万以内</option>
            <option value="200">200 万以内</option>
            <option value="300">300 万以内</option>
          </select>
        </div>

        <section id="propertyList" class="list"></section>
      </main>
    </div>
  </div>

<script src="./app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // 1. 初始化列表页面（保留你原有逻辑）
  RS.setupListPage();

  // 2. 页面加载测试反馈（第6章截图点）
  showToast("房源列表加载完成", "info");
  console.log("[TEST] list page loaded");

  // =========================
  // 收藏功能（增强测试版）
  // =========================
  window.addFavorite = function(id) {
    let token = localStorage.getItem("token");

    // 未登录测试
    if (!token) {
      showToast("未登录无法收藏", "error");
      console.log("[TEST] favorite failed: not logged in");
      return;
    }

    let favs = JSON.parse(localStorage.getItem("favorites") || "[]");

    // 重复收藏测试
    if (favs.includes(id)) {
      showToast("已收藏该房源", "info");
      console.log("[TEST] favorite failed: duplicate");
      return;
    }

    // 正常收藏
    favs.push(id);
    localStorage.setItem("favorites", JSON.stringify(favs));

    showToast("收藏成功", "success");
    console.log("[TEST] favorite success id=" + id);
  };

  // =========================
  // 筛选功能测试反馈（新增）
  // =========================
  const keywordEl = document.getElementById("keyword");
  const statusEl = document.getElementById("status");
  const priceEl = document.getElementById("price");

  function showFilterTip() {
    let keyword = keywordEl?.value || "";
    let status = statusEl?.value || "";
    let price = priceEl?.value || "";

    console.log("[TEST] filter:", { keyword, status, price });

    if (!keyword && !status && !price) {
      showToast("已显示全部房源", "info");
    } else {
      showToast("筛选条件已更新", "success");
    }
  }

  // 绑定筛选事件（不改UI）
  if (keywordEl) keywordEl.addEventListener("input", showFilterTip);
  if (statusEl) statusEl.addEventListener("change", showFilterTip);
  if (priceEl) priceEl.addEventListener("change", showFilterTip);

});
</script>
</body>
</html>
