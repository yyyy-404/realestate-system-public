<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户端注册页面</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="page">
    <section class="panel auth-panel">
      <p class="brand">二手房交易系统</p>
      <h1 class="title">REGISTER</h1>
      <p class="subtitle">注册后可直接回到登录页面</p>

      <form id="registerForm" class="form">
        <input class="input" name="username" type="text" placeholder="Username" />
        <input class="input" name="password" type="password" placeholder="Password" />
        <input class="input" name="confirmPassword" type="password" placeholder="Confirm Password" />

        <div class="role-select">
          <div class="role-item active" data-role="buyer">买家</div>
          <div class="role-item" data-role="seller">卖家</div>
        </div>

        <input type="hidden" name="role" value="buyer" />
        <button class="btn" type="submit">注册</button>
      </form>

      <div class="hint">已有账号？<a href="./login.html">去登录</a></div>
    </section>
  </main>

  <script src="./app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("registerForm");
      const roleItems = document.querySelectorAll(".role-item");
      const roleInput = document.querySelector("input[name='role']");

      // 角色选择
      roleItems.forEach(item => {
        item.addEventListener("click", () => {
          roleItems.forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          roleInput.value = item.dataset.role;
        });
      });

      // 注册逻辑
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const username = formData.get("username");
        const password = formData.get("password");
        const confirmPassword = formData.get("confirmPassword");
        const role = formData.get("role");

        // 1. 空值校验
        if (!username || !password || !confirmPassword) {
          showToast("请填写完整信息", "error");
          return;
        }

        // 2. 密码一致性校验
        if (password !== confirmPassword) {
          showToast("两次密码不一致", "error");
          return;
        }

        // 3. 本地模拟用户库
        let users = JSON.parse(localStorage.getItem("users") || "[]");

        // 4. 重复用户校验（论文第6章关键测试点）
        const exists = users.find(u => u.username === username);
        if (exists) {
          showToast("用户名已存在", "error");
          return;
        }

        // 5. 写入用户
        users.push({
          username,
          password,
          role
        });

        localStorage.setItem("users", JSON.stringify(users));

        // 6. 成功提示 + 跳转
        showToast("注册成功，即将跳转登录页", "success");

        setTimeout(() => {
          window.location.href = "./login.html";
        }, 1200);
      });
    });
  </script>
</body>
</html>
