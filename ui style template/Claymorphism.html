<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>仪表盘 - Claymorphism</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #e0f2fe;
      min-height: 100vh;
      color: #1e293b;
    }
    .container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px;
    }
    h2 {
      font-size: 2.6rem;
      text-align: center;
      margin-bottom: 3rem;
      color: #334155;
    }
    .clay-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.5rem;
    }
    .card {
      background: #f0f9ff;
      border-radius: 32px;
      padding: 2.8rem 2rem;
      text-align: center;
      box-shadow: 
        12px 12px 24px rgba(0,0,0,0.08),
        -12px -12px 24px rgba(255,255,255,0.9);
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 
        20px 20px 40px rgba(0,0,0,0.1),
        -20px -20px 40px rgba(255,255,255,1);
    }
    .card strong {
      font-size: 4.2rem;
      display: block;
      margin: 1.2rem 0;
      color: #3b82f6;
    }
    .hint {
      margin-top: 4rem;
      text-align: center;
      color: #64748b;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>仪表盘</h2>
    <div class="clay-grid">
      <div class="card"><div>房源总数</div><strong>128</strong></div>
      <div class="card"><div>收藏数</div><strong>347</strong></div>
      <div class="card"><div>合同数</div><strong>56</strong></div>
    </div>
    <p class="hint">提示：这些数据可由后端接口提供，我可以继续对接。</p>
  </div>
</body>
</html>
