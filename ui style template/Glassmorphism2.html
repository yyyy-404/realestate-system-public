<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Glass Dashboard Pro - Fixed</title>

    <style>
        :root {
            --bg: #f0f4f8;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --blue: #3b82f6;   /* 稍微调深了颜色，让渐变更明显 */
            --purple: #8b5cf6;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "system-ui", -apple-system, sans-serif;
            /* 增强背景色块，让毛玻璃模糊效果（Blur）更具视觉冲击力 */
            background: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.15), transparent 40%),
                var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        h2::after {
            content: "";
            display: block;
            width: 40px;
            height: 3px;
            margin: 15px auto 0;
            background: linear-gradient(to right, var(--blue), var(--purple));
            border-radius: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            padding: 35px;
            border-radius: 28px;
            background: var(--glass-bg);
            /* 毛玻璃核心代码 */
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.04),
                inset 0 0 0 1px rgba(255, 255, 255, 0.3);
            
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            cursor: pointer;
        }

        /* 鼠标悬停时的光效 */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent 50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .trend {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .trend.up {
            color: #059669;
            background: rgba(16, 185, 129, 0.1);
        }

        .trend.down {
            color: #dc2626;
            background: rgba(239, 68, 68, 0.1);
        }

        .card strong {
            display: block; /* 修复点：确保渐变背景能撑开 */
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: -3px;
            line-height: 1;
            position: relative;
            z-index: 1;

            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hint {
            text-align: center;
            margin-top: 60px;
            color: #94a3b8;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* 适配移动端 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .card strong {
                font-size: 3.5rem;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Records Dashboard</h2>

    <div class="grid">
        <div class="card">
            <div class="card-header">
                <span class="card-title">🏠 Total Estates</span>
                <span class="trend up">+12%</span>
            </div>
            <strong>128</strong>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">⭐ Bookmarked</span>
                <span class="trend up">+8%</span>
            </div>
            <strong>347</strong>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">📦 Archives</span>
                <span class="trend down">-3%</span>
            </div>
            <strong>56</strong>
        </div>
    </div>

    <div class="hint">
        Dashboard Real-time Status • Updated Just Now
    </div>
</div>

</body>
</html>
