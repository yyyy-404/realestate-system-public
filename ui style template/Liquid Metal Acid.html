<!DOCTYPE html>
<!-- 液态金属 + 3D酸性几何（Liquid Metal Acid） -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acid Dashboard - Liquid Metal</title>
  <style>
    body { margin:0; background:#0f001a; min-height:100vh; color:#fff; font-family:Arial; }
    .container { max-width:1000px; margin:80px auto; padding:20px; text-align:center; position:relative; }
    h2 { font-size:5rem; margin-bottom:3rem; background:linear-gradient(90deg, #ff00ff, #00ffff, #ffff00); -webkit-background-clip:text; color:transparent; text-shadow:0 0 40px #ff00ff; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:2.5rem; }
    .card {
      padding:3rem 2rem;
      background:linear-gradient(145deg, #1a0033, #330066);
      border-radius:32px;
      box-shadow: 
        inset 0 0 30px rgba(255,0,255,0.4),
        0 0 60px rgba(0,255,255,0.6);
      backdrop-filter:blur(10px);
      transform:perspective(800px) rotateY(5deg);
      transition:all 0.4s;
    }
    .card:hover { transform:perspective(800px) rotateY(0deg) scale(1.08); box-shadow:0 0 100px #ffff00; }
    .card strong { font-size:6rem; background:linear-gradient(#00ffff, #ff00ff); -webkit-background-clip:text; color:transparent; display:block; }
  </style>
</head>
<body>
  <div class="container">
    <h2>LIQUID ACID</h2>
    <div class="cards">
      <div class="card"><strong>128</strong><br>房源</div>
      <div class="card"><strong>347</strong><br>收藏</div>
      <div class="card"><strong>56</strong><br>合同</div>
    </div>
  </div>
</body>
</html>
