<!DOCTYPE html>
<!-- 柔和mesh渐变背景 + 彩色但最小主义卡片 + 梦幻光晕。 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - Mesh Gradient Minimal</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 50%, #fad0c4 100%);
      min-height: 100vh;
      color: #fff;
      background-attachment: fixed;
    }
    .container {
      max-width: 1100px;
      margin: 80px auto;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    h2 {
      font-size: 3rem;
      margin-bottom: 3rem;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      flex: 1;
      min-width: 260px;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.15);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: all 0.4s;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }
    .card strong {
      font-size: 4.8rem;
      display: block;
      margin: 1rem 0;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.6);
    }
    .card div {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.9);
    }
    .hint {
      margin-top: 4rem;
      color: rgba(255,255,255,0.85);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>仪表盘</h2>
    <div class="cards">
      <div class="card">
        <div>房源总数</div>
        <strong>128</strong>
      </div>
      <div class="card">
        <div>收藏数</div>
        <strong>347</strong>
      </div>
      <div class="card">
        <div>合同数</div>
        <strong>56</strong>
      </div>
    </div>
    <p class="hint">柔光中数据流动...</p>
  </div>
</body>
</html>
