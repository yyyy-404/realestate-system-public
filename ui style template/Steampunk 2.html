<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>精密仪表 - 浅色蒸汽朋克</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #f4f1e6;
      --paper: #e8e2d2;
      --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --border-bronze: #8e795e;
    }

    body {
      margin: 0;
      /* 背景：带有淡淡羊皮纸质感的浅色背景 */
      background-color: #eee9dc;
      background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
      color: #5c4a3c;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .instrument-panel {
      background: var(--ivory);
      padding: 50px;
      border: 2px solid var(--border-bronze);
      border-radius: 10px;
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.1),
        inset 0 0 30px rgba(255,255,255,0.8);
      position: relative;
    }

    /* 顶部精细的铭牌 */
    h2 {
      font-family: 'IM Fell Double Pica', serif;
      font-size: 2.2rem;
      text-align: center;
      margin: 0 0 40px 0;
      color: #4a3728;
      letter-spacing: 2px;
      position: relative;
    }
    
    h2::after {
      content: '';
      display: block;
      width: 100px;
      height: 2px;
      background: var(--gold);
      margin: 10px auto;
    }

    .cards {
      display: flex;
      gap: 35px;
    }

    .card {
      width: 240px;
      background: var(--paper);
      /* 金属边框效果 */
      border: 5px solid;
      border-image: var(--gold) 1;
      padding: 25px;
      text-align: center;
      position: relative;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
    }

    /* 装饰性的黄铜圆钉 */
    .rivet {
      position: absolute;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle at 30% 30%, #fcf6ba, #aa771c);
      border-radius: 50%;
      border: 1px solid #8e795e;
    }
    .r-tl { top: -6px; left: -6px; }
    .r-tr { top: -6px; right: -6px; }
    .r-bl { bottom: -6px; left: -6px; }
    .r-br { bottom: -6px; right: -6px; }

    /* 数据展示区：模拟凹陷的刻度盘 */
    .gauge-well {
      background: #fdfdfb;
      margin-top: 15px;
      padding: 20px 10px;
      border-radius: 50% / 10%; /* 微微的弧度感 */
      border: 1px solid #dcd4c1;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
    }

    .card strong {
      display: block;
      font-family: 'IM Fell Double Pica', serif;
      font-size: 3.5rem;
      color: #2a2a2a;
      /* 这里的效果从发光变成了“深色蚀刻” */
      text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
    }

    .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8e795e;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* 底部细线条装饰 */
    .hint {
      margin-top: 35px;
      color: #9e8e75;
      font-size: 0.75rem;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="instrument-panel">
  <h2>Chronometer & Records</h2>
  
  <div class="cards">
    <div class="card">
      <div class="rivet r-tl"></div><div class="rivet r-tr"></div>
      <div class="label">Total Estates</div>
      <div class="gauge-well">
        <strong>128</strong>
      </div>
      <div class="rivet r-bl"></div><div class="rivet r-br"></div>
    </div>

    <div class="card">
      <div class="rivet r-tl"></div><div class="rivet r-tr"></div>
      <div class="label">Bookmarked</div>
      <div class="gauge-well">
        <strong>347</strong>
      </div>
      <div class="rivet r-bl"></div><div class="rivet r-br"></div>
    </div>

    <div class="card">
      <div class="rivet r-tl"></div><div class="rivet r-tr"></div>
      <div class="label">Archives</div>
      <div class="gauge-well">
        <strong>56</strong>
      </div>
      <div class="rivet r-bl"></div><div class="rivet r-br"></div>
    </div>
  </div>

  <p class="hint">Royal Surveying Department - Patent No. 8742-B</p>
</div>

</body>
</html>
