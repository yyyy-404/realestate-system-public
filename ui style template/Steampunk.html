<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>工业遗迹 - 蒸汽朋克高级版</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    :root {
      --brass: linear-gradient(145deg, #e6b800, #996600, #664400);
      --iron: #2b2b2b;
      --glass: rgba(255, 255, 255, 0.15);
      --neon: #ff5e00;
    }

    body {
      margin: 0;
      background: #1a120b url('https://www.transparenttextures.com/patterns/dark-leather.png');
      color: #d4af37;
      font-family: 'Special Elite', serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dashboard {
      background: #2a1d15;
      padding: 40px;
      border: 12px solid #3d2b1f;
      border-image: linear-gradient(to bottom, #5d4037, #2a1d15) 1;
      box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.5);
      position: relative;
    }

    /* 装饰：顶部铭牌 */
    h2 {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 2.5rem;
      text-align: center;
      margin: -60px auto 40px;
      background: var(--brass);
      color: #1a120b;
      padding: 10px 40px;
      clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%);
      border-bottom: 4px solid #4a321f;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .cards {
      display: flex;
      gap: 30px;
    }

    .card {
      width: 260px;
      background: #1a110a;
      border: 4px solid #4a321f;
      border-radius: 8px;
      padding: 20px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    /* 精细化螺丝钉 */
    .screw {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #5d4037;
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px #fff, 1px 1px 3px #000;
    }
    .screw::after {
      content: '';
      position: absolute;
      top: 50%; left: 10%; width: 80%; height: 2px;
      background: #2a1d15;
      transform: rotate(45deg);
    }
    .top-l { top: 10px; left: 10px; }
    .top-r { top: 10px; right: 10px; }
    .bot-l { bottom: 10px; left: 10px; }
    .bot-r { bottom: 10px; right: 10px; }

    /* 真空管显示器效果 */
    .tube-container {
      background: #050505;
      border: 4px solid #3d2b1f;
      border-radius: 15px;
      padding: 25px 10px;
      margin-top: 15px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 20px #000;
    }

    /* 模拟玻璃反光线 */
    .tube-container::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; width: 5px; height: 100%;
      background: rgba(255,255,255,0.05);
      z-index: 2;
    }

    strong {
      display: block;
      font-size: 4rem;
      color: var(--neon);
      /* 核心：真空管发光文字 */
      text-shadow: 
        0 0 5px #ff0000,
        0 0 15px var(--neon),
        0 0 30px var(--neon);
      letter-spacing: 5px;
      filter: blur(0.3px);
      animation: flicker 4s infinite;
    }

    .label {
      font-size: 0.9rem;
      color: #8b4513;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #3d2b1f;
      display: inline-block;
      margin-bottom: 10px;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      98% { opacity: 0.9; }
    }

    /* 底部提示文本 */
    .hint {
      margin-top: 30px;
      color: #5d4037;
      font-size: 0.8rem;
      text-align: center;
      border-top: 1px dashed #3d2b1f;
      padding-top: 15px;
    }
  </style>
</head>
<body>

<div class="dashboard">
  <h2>The Steam Engine Control</h2>
  
  <div class="cards">
    <div class="card">
      <div class="screw top-l"></div><div class="screw top-r"></div>
      <div class="label">Total Capacity</div>
      <div class="tube-container">
        <strong>128</strong>
      </div>
      <div class="screw bot-l"></div><div class="screw bot-r"></div>
    </div>

    <div class="card">
      <div class="screw top-l"></div><div class="screw top-r"></div>
      <div class="label">Engine Heat</div>
      <div class="tube-container">
        <strong>347</strong>
      </div>
      <div class="screw bot-l"></div><div class="screw bot-r"></div>
    </div>

    <div class="card">
      <div class="screw top-l"></div><div class="screw top-r"></div>
      <div class="label">Pressure Bar</div>
      <div class="tube-container">
        <strong>56</strong>
      </div>
      <div class="screw bot-l"></div><div class="screw bot-r"></div>
    </div>
  </div>

  <p class="hint">AUTHENTIC INDUSTRIAL MONITORING SYSTEM v1.89 / LONDON</p>
</div>

</body>
</html>
