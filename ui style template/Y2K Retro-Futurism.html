<!DOCTYPE html>
<!-- 极度 Y2K (Extreme Y2K Aesthetic)，也常被称为 千禧粉红科技风 (Cyber-Bimbo / Cyber-Pink) 结合了 复古视窗风格 (Windows 95/98 Retro)。 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - FULL Y2K OVERLOAD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #ff00aa, #00ffff, #ff1493, #00bfff, #ff69b4);
      background-size: 600% 600%;
      animation: hyperShift 20s ease infinite;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
      position: relative;
      image-rendering: pixelated; /* 像素风加成 */
    }

    @keyframes hyperShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 扫描线 CRT 效果 */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.08) 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9999;
      animation: scan 8s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3rem;
      text-align: center;
      margin: 1rem 0 2rem;
      color: #fff;
      text-shadow: 0 0 15px #ff00ff, 0 0 30px #00ffff, 0 0 45px #ff1493;
      letter-spacing: 6px;
      animation: glitch 2s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
      10% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
      20% { text-shadow: 0 0 #ff00ff; }
      30% { text-shadow: 5px 0 #00ffff, -5px 0 #ff00ff; }
      100% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
    }

    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card-window {
      position: relative;
      width: 320px;
      background: rgba(0, 0, 0, 0.5);
      border: 4px solid #00ffff;
      border-top: 32px solid #ff00aa;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.7), inset 0 0 20px rgba(255, 0, 170, 0.5);
      overflow: hidden;
      transition: all 0.3s;
    }

    .card-window:hover {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 0 60px rgba(0, 255, 255, 1), inset 0 0 40px rgba(255, 0, 170, 0.8);
    }

    .title-bar {
      position: absolute;
      top: -28px; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(to right, #ff00aa, #00ffff);
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: black;
      text-shadow: none;
    }

    .buttons {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #000;
    }

    .card-content {
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .card strong {
      font-family: 'VT323', monospace;
      font-size: 5rem;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
      display: block;
      margin: 1rem 0;
      animation: pulseNum 1.5s infinite alternate;
    }

    @keyframes pulseNum {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .label {
      font-size: 1.4rem;
      color: #ff69b4;
      text-shadow: 0 0 10px #ff69b4;
    }

    /* 飘浮心形粒子 */
    .heart {
      position: absolute;
      font-size: 2rem;
      color: #ff69b4;
      opacity: 0.7;
      pointer-events: none;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Y2K DASHBOARD v2.000</h2>

    <div class="cards">
      <div class="card-window">
        <div class="title-bar">房源总数.exe <div class="buttons"><div class="btn"></div><div class="btn"></div><div class="btn"></div></div></div>
        <div class="card-content">
          <div class="label">TOTAL PROPERTIES</div>
          <strong>128</strong>
        </div>
      </div>

      <div class="card-window">
        <div class="title-bar">收藏数.sys <div class="buttons"><div class="btn"></div><div class="btn"></div><div class="btn"></div></div></div>
        <div class="card-content">
          <div class="label">FAVORITES</div>
          <strong>347</strong>
        </div>
      </div>

      <div class="card-window">
        <div class="title-bar">合同数.dll <div class="buttons"><div class="btn"></div><div class="btn"></div><div class="btn"></div></div></div>
        <div class="card-content">
          <div class="label">CONTRACTS</div>
          <strong>56</strong>
        </div>
      </div>
    </div>

    <p style="text-align:center; margin-top:3rem; font-size:1.3rem; color:#ff00ff; text-shadow:0 0 15px #ff00ff;">
      >>> 系统过载中... 别关机，不然数据会蒸发哦~ ♡ <<<
    </p>
  </div>

  <!-- 随机飘心 -->
  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '♡';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 15000);
    }
    setInterval(createHeart, 800);
  </script>

</body>
</html>
