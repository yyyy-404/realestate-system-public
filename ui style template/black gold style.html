<!DOCTYPE html>

<!-- 黑金风格 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Real Estate Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --radius: 18px;

  /* 🎯 核心色系 */
  --bg-main: #0f1115;
  --panel-bg: rgba(255,255,255,0.04);

  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);

  --text-main: #eaeaea;
  --text-sub: #8b8f98;

  /* 克制金色 */
  --gold: #c6a15b;

  --shadow: 0 10px 40px rgba(0,0,0,0.6);

  --transition: 0.35s ease;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);

  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ===== 面板 ===== */
.panel {
  width: min(1000px, 92%);
  padding: 40px;
  border-radius: var(--radius);

  background: var(--panel-bg);
  backdrop-filter: blur(12px);

  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

/* ===== 标题 ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.title {
  font-size: 1.4rem;
  font-weight: 500;
  letter-spacing: 1px;
}

/* 金色细线（克制使用） */
.title::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  margin-top: 8px;
  background: var(--gold);
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}

/* ===== 卡片 ===== */
.card {
  position: relative;
  padding: 22px;
  border-radius: var(--radius);

  background: var(--glass);
  border: 1px solid var(--border);

  transition: var(--transition);
  overflow: hidden;
}

/* hover 不是浮起来，而是“变亮” */
.card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(198,161,91,0.4);
}

/* 左侧金线（资产感关键） */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 20%;
  width: 2px;
  height: 60%;
  background: var(--gold);
  opacity: 0.4;
}

/* ===== 内容 ===== */
.label {
  font-size: 0.7rem;
  letter-spacing: 1.5px;
  color: var(--text-sub);
  margin-bottom: 10px;
}

.value {
  font-size: 2.4rem;
  font-weight: 600;

  font-variant-numeric: tabular-nums;
}

/* 单位 */
.unit {
  font-size: 0.9rem;
  color: var(--text-sub);
  margin-left: 6px;
}

/* ===== 底部 ===== */
.footer {
  margin-top: 30px;
  font-size: 0.75rem;
  color: var(--text-sub);
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .panel {
    padding: 24px;
  }
}
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    <div class="title">Property Overview</div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="label">TOTAL LISTINGS</div>
      <div class="value">128<span class="unit">套</span></div>
    </div>

    <div class="card">
      <div class="label">AVG PRICE</div>
      <div class="value">¥3.8M</div>
    </div>

    <div class="card">
      <div class="label">BOOKMARKED</div>
      <div class="value">347</div>
    </div>

    <div class="card">
      <div class="label">TRANSACTIONS</div>
      <div class="value">56</div>
    </div>

  </div>

  <div class="footer">
    Real Estate Intelligence System · Updated in real time
  </div>

</div>

</body>
</html>
