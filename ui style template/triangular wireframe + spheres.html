<!DOCTYPE html>
<!-- 三角/棱柱线框隧道 + 金属球 + 冷调光束 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro-Futurism - Triangular Wire Tunnel</title>
  <style>
    body { margin:0; height:100vh; background:#000b1e; overflow:hidden; color:#aaffff; }
    .tunnel { position:fixed; inset:0; background:radial-gradient(#001133, #000); perspective:1100px; animation:trip 75s linear infinite; }
    @keyframes trip { 0% { transform:translateZ(0) rotateX(0deg); } 100% { transform:translateZ(-3500px) rotateX(1.5deg); } }
    .wire { position:absolute; inset:0; border:4px solid transparent; border-image:linear-gradient(45deg, #00ffff, #ff00aa) 1; clip-path:polygon(50% 0%, 100% 100%, 0% 100%); transform:rotateX(65deg) translateZ(-800px); animation:wireSpin 20s linear infinite; }
    .sphere { position:absolute; width:160px; height:160px; border-radius:50%; border:3px dashed #00ffff; box-shadow:0 0 60px #00ffff66; top:30%; left:40%; animation:floatTri 25s infinite; }
    @keyframes wireSpin { 0% { transform:rotateX(65deg) translateZ(-800px) rotate(0deg); } 100% { transform:rotateX(65deg) translateZ(-800px) rotate(360deg); } }
    @keyframes floatTri { 0%,100% { transform:translate(0,0) rotate(0deg); } 50% { transform:translate(-80px,-100px) rotate(180deg); } }
    .content { position:relative; z-index:10; padding:120px 30px; text-align:center; }
    h1 { font-size:5rem; text-shadow:0 0 60px #00ffff, 0 0 80px #ff00aa; }
    .stats { display:flex; gap:4rem; justify-content:center; flex-wrap:wrap; }
    .stat { background:rgba(0,0,20,0.6); padding:2.5rem 4rem; border:2px solid #00aaff; backdrop-filter:blur(15px); min-width:250px; }
    .stat strong { font-size:8rem; color:#00ffff; text-shadow:0 0 50px #00ffff; }
  </style>
</head>
<body>
  <div class="tunnel">
    <div class="wire"></div>
    <div class="sphere"></div>
  </div>
  <div class="content">
    <h1>TRIAD TUNNEL CORE</h1>
    <div class="stats">
      <div class="stat"><strong>128</strong> PROPERTIES</div>
      <div class="stat"><strong>347</strong> FAVORITES</div>
      <div class="stat"><strong>56</strong> CONTRACTS</div>
    </div>
  </div>
</body>
</html>
